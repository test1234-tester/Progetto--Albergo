<article class="card room-card h-100 shadow-sm">
  @if (room.immagine) {
    <img [src]="room.immagine" [alt]="room.nome" class="card-img-top room-card-img" />
  } @else {
    <div class="room-card-img room-card-img-placeholder"></div>
  }

  <div class="card-body d-flex flex-column">
    <h3 class="card-title room-card-title d-flex justify-content-between align-items-center">
      {{ room.nome }}
      @if (disponibiliCount !== undefined) {
        <span class="badge bg-success fs-6">{{ disponibiliCount }} disponibili</span>
      }
    </h3>
    
    <p class="card-text room-card-desc">{{ room.descrizione }}</p>

    <div class="mt-auto d-flex align-items-center justify-content-between pt-2">
      @if (room.prezzoPerNotte) {
        <span class="room-card-price">{{ room.prezzoPerNotte }} € <small>/ notte</small></span>
      }
      <a
        [routerLink]="['/stanze', room.idCamera, 'prenota']"
        [queryParams]="bookingQueryParams"
        class="btn btn-primary btn-sm"
      >
        Prenota
      </a>
    </div>
  </div>
</article>
