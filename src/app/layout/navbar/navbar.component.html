<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" routerLink="/">Albergo Online</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarContent"
      aria-controls="navbarContent"
      aria-expanded="false"
      aria-label="Apri il menu"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/stanze" routerLinkActive="active">Stanze</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/spa" routerLinkActive="active">Spa</a>
        </li>
      </ul>

      <ul class="navbar-nav">
        @if (authService.isAuthenticated()) {
          <li class="nav-item d-flex align-items-center gap-2">
            <span class="nav-user">Ciao, {{ authService.currentUser()?.nome }}</span>
            <button type="button" class="btn btn-sm btn-outline-light" (click)="logout()">Esci</button>
          </li>
        } @else {
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">Accedi</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-gold btn-sm ms-lg-2" routerLink="/register">Registrati</a>
